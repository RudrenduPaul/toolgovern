name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Audit (high/critical only)
        run: npm audit --audit-level=high

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install package with dev extras
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Test
        working-directory: python
        run: pytest

  python-integration-autogen-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install toolgovern core (editable)
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Install integration package with dev extras
        working-directory: integrations/autogen
        run: pip install -e ".[dev]"

      - name: Test
        working-directory: integrations/autogen
        run: pytest

  crewai-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      # toolgovern core isn't on PyPI yet (see python/CHANGELOG.md) -- installing it editable
      # first means the `toolgovern>=0.1.0,<0.2` dependency pin below resolves against this
      # already-installed local copy instead of hitting PyPI.
      - name: Install toolgovern core (editable)
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Install integration package with dev extras
        working-directory: integrations/crewai
        run: pip install -e ".[dev]"

      - name: Test
        working-directory: integrations/crewai
        run: pytest

  agent-framework-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      # toolgovern is not yet published to PyPI (publishing is a separate, later step) --
      # install the core package from this monorepo in editable mode first, then the
      # integration package, which pins toolgovern as a normal version-range dependency for
      # when it is published.
      - name: Install toolgovern core (editable)
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Install integration package with dev extras
        working-directory: integrations/agent-framework
        run: pip install -e ".[dev]"

      - name: Test
        working-directory: integrations/agent-framework
        run: pytest
